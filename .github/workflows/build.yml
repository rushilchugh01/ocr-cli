name: Build Release Artifacts

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            runs_on: windows-latest
            python_version: "3.13"
            artifact_name: veridis-ocr-cli-windows-x64
            archive_suffix: windows-x64
            shell: pwsh
            setup_venv: python -m venv .venv-build
            install_pyinstaller: .venv-build\Scripts\pip.exe install pyinstaller
            install_project: .venv-build\Scripts\pip.exe install -e .
            preload_models: .venv-build\Scripts\python.exe scripts\preload_models.py
            build_cmd: .venv-build\Scripts\pyinstaller.exe --noconfirm rapidocr_cli.spec
            package_cmd: Compress-Archive -Path dist\veridis-ocr-cli -DestinationPath $env:ARCHIVE_NAME
          - label: linux-x64
            runs_on: ubuntu-latest
            python_version: "3.13"
            artifact_name: veridis-ocr-cli-linux-x64
            archive_suffix: linux-x64
            shell: bash
            setup_venv: python -m venv .venv-build
            install_pyinstaller: .venv-build/bin/pip install pyinstaller
            install_project: .venv-build/bin/pip install -e .
            preload_models: .venv-build/bin/python scripts/preload_models.py
            build_cmd: .venv-build/bin/pyinstaller --noconfirm rapidocr_cli.spec
            package_cmd: tar -C dist -czf "$ARCHIVE_NAME" veridis-ocr-cli
          - label: macos-arm64
            runs_on: macos-latest
            python_version: "3.13"
            artifact_name: veridis-ocr-cli-macos-arm64
            archive_suffix: macos-arm64
            shell: bash
            setup_venv: python -m venv .venv-build
            install_pyinstaller: .venv-build/bin/pip install pyinstaller
            install_project: .venv-build/bin/pip install -e .
            preload_models: .venv-build/bin/python scripts/preload_models.py
            build_cmd: .venv-build/bin/pyinstaller --noconfirm rapidocr_cli.spec
            package_cmd: tar -C dist -czf "$ARCHIVE_NAME" veridis-ocr-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Read version from pyproject.toml
        id: version
        shell: bash
        run: |
          version=$(python3 - <<'PY'
          import pathlib
          import re
          text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version = "(.+)"$', text, re.MULTILINE)
          if not match:
              raise SystemExit("Unable to read version from pyproject.toml")
          print(match.group(1))
          PY
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute archive name
        id: archive
        shell: bash
        run: |
          case "${{ matrix.runs_on }}" in
            windows-*)
              extension="zip"
              ;;
            *)
              extension="tar.gz"
              ;;
          esac
          archive_name="veridis-ocr-cli-${{ matrix.archive_suffix }}-v${{ steps.version.outputs.version }}.${extension}"
          echo "name=$archive_name" >> "$GITHUB_OUTPUT"

      - name: Create build virtualenv
        shell: ${{ matrix.shell }}
        run: ${{ matrix.setup_venv }}

      - name: Install PyInstaller
        shell: ${{ matrix.shell }}
        run: ${{ matrix.install_pyinstaller }}

      - name: Install project and dependencies
        shell: ${{ matrix.shell }}
        run: ${{ matrix.install_project }}

      - name: Preload OCR models
        shell: ${{ matrix.shell }}
        run: ${{ matrix.preload_models }}

      - name: Build with PyInstaller
        shell: ${{ matrix.shell }}
        run: ${{ matrix.build_cmd }}

      - name: Package artifact
        shell: ${{ matrix.shell }}
        env:
          ARCHIVE_NAME: ${{ steps.archive.outputs.name }}
        run: ${{ matrix.package_cmd }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.archive.outputs.name }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: version
        shell: bash
        run: |
          version=$(python3 - <<'PY'
          import pathlib
          import re
          text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version = "(.+)"$', text, re.MULTILINE)
          if not match:
              raise SystemExit("Unable to read version from pyproject.toml")
          print(match.group(1))
          PY
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create or update release tag
        env:
          VERSION_TAG: v${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            git tag -f "$VERSION_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$VERSION_TAG" --force
          else
            git tag -a "$VERSION_TAG" "$GITHUB_SHA" -m "Release $VERSION_TAG"
            git push origin "refs/tags/$VERSION_TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: release-artifacts/**/*
          make_latest: true
