name: Build Windows CLI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Read version from pyproject.toml
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create venv
        run: python -m venv NOSProjectsothersocrrapidocr.venv-win

      - name: Install PyInstaller into venv
        run: NOSProjectsothersocrrapidocr.venv-win\Scripts\pip.exe install pyinstaller

      - name: Install project and dependencies
        run: NOSProjectsothersocrrapidocr.venv-win\Scripts\pip.exe install -e .

      - name: Preload OCR models
        run: NOSProjectsothersocrrapidocr.venv-win\Scripts\python.exe scripts\preload_models.py

      - name: Build with PyInstaller
        run: NOSProjectsothersocrrapidocr.venv-win\Scripts\pyinstaller.exe --noconfirm rapidocr_cli.spec

      - name: Zip release artifact
        shell: pwsh
        run: Compress-Archive -Path dist\rapidocr-cli -DestinationPath rapidocr-cli-windows-x64-v${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          files: rapidocr-cli-windows-x64-v${{ steps.version.outputs.VERSION }}.zip
          make_latest: true
