name: Build CLI Binaries

on:
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      build_ref: ${{ steps.finalize.outputs.build_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build source
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event.head_commit.message }}" == chore:\ bump\ version\ to* ]]; then
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            echo "build_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main --depth=2
          remote_head="$(git rev-parse origin/main)"
          remote_message="$(git log -1 --pretty=%B "$remote_head")"
          remote_parent="$(git rev-list --parents -n1 "$remote_head" | awk '{print $2}')"

          if [[ "$remote_message" == chore:\ bump\ version\ to* ]] && [[ "$remote_parent" == "$GITHUB_SHA" ]]; then
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            echo "build_ref=$remote_head" >> "$GITHUB_OUTPUT"
          else
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.12
        if: steps.resolve.outputs.should_bump == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Commit version bump
        if: steps.resolve.outputs.should_bump == 'true'
        id: commit
        shell: bash
        run: |
          new_version="$(python scripts/bump_version.py)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/rapidocr_cli/__init__.py
          git commit -m "chore: bump version to $new_version"
          build_ref="$(git rev-parse HEAD)"
          git push origin HEAD:main
          echo "build_ref=$build_ref" >> "$GITHUB_OUTPUT"

      - name: Finalize build ref
        id: finalize
        shell: bash
        run: |
          if [[ "${{ steps.resolve.outputs.should_bump }}" == "true" ]]; then
            echo "build_ref=${{ steps.commit.outputs.build_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "build_ref=${{ steps.resolve.outputs.build_ref }}" >> "$GITHUB_OUTPUT"
          fi

  metadata:
    needs: version-bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_ref: ${{ needs.version-bump.outputs.build_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.build_ref }}

      - name: Read version from pyproject.toml
        id: version
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          print(f"version={version}")
          PY

  build-windows:
    needs: metadata
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.build_ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv
        run: python -m venv .venv-build-windows

      - name: Install PyInstaller into venv
        run: .venv-build-windows\Scripts\pip.exe install pyinstaller

      - name: Install project and dependencies
        run: .venv-build-windows\Scripts\pip.exe install -e .

      - name: Preload OCR models
        run: .venv-build-windows\Scripts\python.exe scripts\preload_models.py

      - name: Build with PyInstaller
        run: .venv-build-windows\Scripts\pyinstaller.exe --noconfirm --workpath build-windows --distpath dist-windows rapidocr_cli.spec

      - name: Smoke test bundled CLI
        shell: pwsh
        run: |
          .\dist-windows\veridis-ocr-cli\veridis-ocr-cli.exe --version
          .\dist-windows\veridis-ocr-cli\veridis-ocr-cli.exe check --format json > $null

      - name: Zip release artifact
        shell: pwsh
        run: Compress-Archive -Path dist-windows\veridis-ocr-cli -DestinationPath veridis-ocr-cli-windows-x64-v${{ needs.metadata.outputs.version }}.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: veridis-ocr-cli-windows-x64-v${{ needs.metadata.outputs.version }}.zip

  build-linux:
    needs: metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.build_ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv
        run: python -m venv .venv-build-linux

      - name: Install PyInstaller into venv
        run: .venv-build-linux/bin/pip install pyinstaller

      - name: Install project and dependencies
        run: .venv-build-linux/bin/pip install -e .

      - name: Preload OCR models
        run: .venv-build-linux/bin/python scripts/preload_models.py

      - name: Build with PyInstaller
        run: .venv-build-linux/bin/pyinstaller --noconfirm --workpath build-linux --distpath dist-linux rapidocr_cli.spec

      - name: Smoke test bundled CLI
        run: |
          ./dist-linux/veridis-ocr-cli/veridis-ocr-cli --version
          ./dist-linux/veridis-ocr-cli/veridis-ocr-cli check --format json > /dev/null

      - name: Archive Linux artifact
        run: tar -C dist-linux -czf veridis-ocr-cli-linux-x64-v${{ needs.metadata.outputs.version }}.tar.gz veridis-ocr-cli

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: veridis-ocr-cli-linux-x64-v${{ needs.metadata.outputs.version }}.tar.gz

  build-macos:
    needs: metadata
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.build_ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv
        run: python -m venv .venv-build-macos

      - name: Install PyInstaller into venv
        run: .venv-build-macos/bin/python -m pip install pyinstaller

      - name: Install project and dependencies
        run: .venv-build-macos/bin/python -m pip install -e .

      - name: Preload OCR models
        run: .venv-build-macos/bin/python scripts/preload_models.py

      - name: Build with PyInstaller
        run: .venv-build-macos/bin/python -m PyInstaller --noconfirm --workpath build-macos --distpath dist-macos rapidocr_cli.spec

      - name: Smoke test bundled CLI
        run: |
          ./dist-macos/veridis-ocr-cli/veridis-ocr-cli --version
          ./dist-macos/veridis-ocr-cli/veridis-ocr-cli check --format json > /dev/null

      - name: Archive macOS artifact
        run: tar -C dist-macos -czf veridis-ocr-cli-macos-arm64-v${{ needs.metadata.outputs.version }}.tar.gz veridis-ocr-cli

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: veridis-ocr-cli-macos-arm64-v${{ needs.metadata.outputs.version }}.tar.gz

  release:
    needs:
      - metadata
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.metadata.outputs.version }}
          name: v${{ needs.metadata.outputs.version }}
          files: |
            release-assets/windows-release/veridis-ocr-cli-windows-x64-v${{ needs.metadata.outputs.version }}.zip
            release-assets/linux-release/veridis-ocr-cli-linux-x64-v${{ needs.metadata.outputs.version }}.tar.gz
            release-assets/macos-release/veridis-ocr-cli-macos-arm64-v${{ needs.metadata.outputs.version }}.tar.gz
          make_latest: true
